name: ekinos
description: "EKINOS - Yerel Tarım, Ortak Gelecek."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# ---------------------------------------------------------------------------
# App Icon — generates real launcher icons for Android & iOS from the
# EKINOS wheat-mark artwork (replaces the default Flutter logo).
# Run: dart run flutter_launcher_icons
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_logo.png"
  min_sdk_android: 21
